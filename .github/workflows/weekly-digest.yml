name: Weekly HCC Digest

on:
  schedule:
    # Every Monday at 01:00 UTC = 09:00 Taiwan time
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run digest pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          PAGE_URL: https://jejenhu-maker.github.io/hcc-weekly-digest/
        run: node src/index.js

      - name: Commit & push updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update weekly digest $(date -u +%Y-%m-%d)"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest
          path: |
            output/*
            docs/*
          retention-days: 30
